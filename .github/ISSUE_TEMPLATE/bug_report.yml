name: Bug Report
description: Report a bug or unexpected behavior
labels: ['bug']
body:
    - type: markdown
      attributes:
          value: |
              Thanks for reporting a bug! Please fill out the sections below.

    - type: input
      id: package
      attributes:
          label: Package
          description: Which package is affected?
          placeholder: '@agentier/core'
      validations:
          required: true

    - type: textarea
      id: description
      attributes:
          label: Description
          description: A clear description of the bug.
      validations:
          required: true

    - type: textarea
      id: reproduction
      attributes:
          label: Reproduction
          description: Minimal code to reproduce the issue.
          render: typescript
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected behavior
          description: What did you expect to happen?
      validations:
          required: true

    - type: textarea
      id: actual
      attributes:
          label: Actual behavior
          description: What actually happened?
      validations:
          required: true

    - type: input
      id: version
      attributes:
          label: Version
          placeholder: '0.1.0'
      validations:
          required: true

    - type: dropdown
      id: runtime
      attributes:
          label: Runtime
          options:
              - Bun
              - Node.js
              - Deno
              - Other
      validations:
          required: true
