name: Feature Request
description: Suggest a new feature or enhancement
labels: ['enhancement']
body:
    - type: markdown
      attributes:
          value: |
              Thanks for suggesting a feature! Please describe what you'd like.

    - type: textarea
      id: problem
      attributes:
          label: Problem
          description: What problem does this feature solve?
      validations:
          required: true

    - type: textarea
      id: solution
      attributes:
          label: Proposed solution
          description: How do you envision this working?
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
          description: Any other approaches you've thought about?

    - type: textarea
      id: example
      attributes:
          label: Example usage
          description: How would the API look?
          render: typescript
